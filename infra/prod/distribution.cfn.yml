AWSTemplateFormatVersion: 2010-09-09
Description: "Stage 4: CloudFront distribution for hedgerules.micahrl.com"

# Deploy in us-east-1 (same region as the stage 1 stack).
#
# Before deploying this stack, run hedgerules deploy (stage 3) to create
# the CloudFront Functions. This stack references them by name.
#
# After deploying, CNAME your domain to the DistributionDomainName output.

Parameters:
  Domain:
    Type: String
    Default: hedgerules.micahrl.com

  ContentBucketName:
    Type: String
    Description: S3 bucket name (from stage 1 ContentBucketName output)

  ContentBucketRegionalDomainName:
    Type: String
    Description: S3 bucket regional domain name (from stage 1 ContentBucketRegionalDomainName output)

  OriginAccessControlId:
    Type: String
    Description: OAC ID (from stage 1 OriginAccessControlId output)

  CertificateArn:
    Type: String
    Description: ACM certificate ARN (from stage 1 CertificateArn output)

  RequestFunctionName:
    Type: String
    Description: Name of the viewer-request CloudFront Function (from hedgerules.toml functions.request-name)

  ResponseFunctionName:
    Type: String
    Description: Name of the viewer-response CloudFront Function (from hedgerules.toml functions.response-name)

  LogsBucketDomainName:
    Type: String
    Description: Logs bucket domain name (from stage 1 LogsBucketDomainName output)

Resources:

  ContentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ContentBucketName
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ContentBucketName}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        Comment: !Sub "CloudFront distribution for ${Domain}"

        Aliases:
          - !Ref Domain
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        Origins:
          - Id: S3Origin
            DomainName: !Ref ContentBucketRegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControlId
            S3OriginConfig: {}

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !Sub "arn:aws:cloudfront::${AWS::AccountId}:function/${RequestFunctionName}"
            - EventType: viewer-response
              FunctionARN: !Sub "arn:aws:cloudfront::${AWS::AccountId}:function/${ResponseFunctionName}"

        DefaultRootObject: index.html

        # S3 with OAC returns 403 for missing objects, map to 404 page
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300

        Logging:
          Bucket: !Ref LogsBucketDomainName
          Prefix: !Sub "cloudfront/${Domain}/"
          IncludeCookies: false

        PriceClass: PriceClass_100

  # --- CloudWatch Logs delivery (standard logging v2) ---

  CloudFrontLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/cloudfront/${AWS::StackName}"
      RetentionInDays: 30

  CloudFrontLogsDeliverySource:
    Type: AWS::Logs::DeliverySource
    Properties:
      Name: !Sub "${AWS::StackName}-source"
      ResourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"
      LogType: ACCESS_LOGS

  CloudFrontLogsDeliveryDestination:
    Type: AWS::Logs::DeliveryDestination
    Properties:
      Name: !Sub "${AWS::StackName}-destination"
      DestinationResourceArn: !GetAtt CloudFrontLogGroup.Arn
      OutputFormat: json

  CloudFrontLogsDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref CloudFrontLogsDeliverySource
      DeliveryDestinationArn: !GetAtt CloudFrontLogsDeliveryDestination.Arn

  CloudFrontDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-cloudfront"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/CloudFront", "Requests", "DistributionId", "${Distribution}", "Region", "Global", {"id": "req", "visible": false, "stat": "Sum"}],
                  ["AWS/CloudFront", "4xxErrorRate", "DistributionId", "${Distribution}", "Region", "Global", {"id": "r4xx", "visible": false, "stat": "Average"}],
                  ["AWS/CloudFront", "5xxErrorRate", "DistributionId", "${Distribution}", "Region", "Global", {"id": "r5xx", "visible": false, "stat": "Average"}],
                  [{"expression": "req", "label": "All", "id": "all", "color": "#aec7e8"}],
                  [{"expression": "req * (100 - r4xx - r5xx) / 100", "label": "2xx+3xx", "id": "ok", "color": "#2ca02c"}],
                  [{"expression": "req * r4xx / 100", "label": "4xx", "id": "e4xx", "color": "#ff7f0e"}],
                  [{"expression": "req * r5xx / 100", "label": "5xx", "id": "e5xx", "color": "#d62728"}]
                ],
                "period": 300,
                "region": "us-east-1",
                "title": "Requests",
                "view": "timeSeries",
                "yAxis": { "left": { "min": 0 } }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/CloudFront", "4xxErrorRate", "DistributionId", "${Distribution}", "Region", "Global"],
                  ["AWS/CloudFront", "5xxErrorRate", "DistributionId", "${Distribution}", "Region", "Global"]
                ],
                "period": 300,
                "stat": "Average",
                "region": "us-east-1",
                "title": "Error Rates",
                "view": "timeSeries",
                "yAxis": { "left": { "min": 0 } }
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/CloudFront", "BytesDownloaded", "DistributionId", "${Distribution}", "Region", "Global"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "us-east-1",
                "title": "Bytes Downloaded",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/CloudFront", "TotalErrorRate", "DistributionId", "${Distribution}", "Region", "Global"]
                ],
                "period": 300,
                "stat": "Average",
                "region": "us-east-1",
                "title": "Total Error Rate",
                "view": "singleValue"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | fields @timestamp, `cs-uri-stem`, `sc-status`, `c-ip` | filter `sc-status` >= 400 | sort @timestamp desc | limit 50",
                "region": "${AWS::Region}",
                "title": "Recent Errors",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | stats count(*) as requests by `cs-uri-stem` | sort requests desc | limit 25",
                "region": "${AWS::Region}",
                "title": "Top Pages",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | filter `cs-user-agent` like \"gptbot\" or `cs-user-agent` like \"claudebot\" or `cs-user-agent` like \"bytespider\" or `cs-user-agent` like \"ccbot\" or `cs-user-agent` like \"perplexitybot\" or `cs-user-agent` like \"amazonbot\" or `cs-user-agent` like \"google-extended\" | stats count(*) as requests by `cs-user-agent` | sort requests desc | limit 25",
                "region": "${AWS::Region}",
                "title": "Bot Traffic",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | stats count(*) as requests by bin(1h) | sort @timestamp asc",
                "region": "${AWS::Region}",
                "title": "Traffic Over Time",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 24,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | filter `cs-referer` != '-' | stats count(*) as requests by `cs-referer` | sort requests desc | limit 25",
                "region": "${AWS::Region}",
                "title": "Top Referrers",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 24,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | stats sum(`sc-bytes`) as bytes by `cs-uri-stem` | sort bytes desc | limit 25",
                "region": "${AWS::Region}",
                "title": "Bandwidth by Page",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 30,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | stats count(*) as requests by `x-edge-location` | sort requests desc | limit 25",
                "region": "${AWS::Region}",
                "title": "Edge Locations",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 30,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/cloudfront/${AWS::StackName}' | stats count(*) as requests by `x-edge-result-type` | sort requests desc",
                "region": "${AWS::Region}",
                "title": "Cache Hit/Miss Breakdown",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DistributionId:
    Description: Use in hugo.toml as deployment.targets.cloudFrontDistributionID
    Value: !Ref Distribution

  DistributionDomainName:
    Description: CNAME your domain to this value
    Value: !GetAtt Distribution.DomainName

  WebsiteURL:
    Value: !Sub "https://${Domain}"

  DashboardName:
    Description: CloudWatch dashboard for CloudFront metrics
    Value: !Sub "${AWS::StackName}-cloudfront"
